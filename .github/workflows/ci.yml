name: CI

on:
  pull_request:
    branches:
      - staging
      - master
  push:
    branches:
      - staging
  workflow_dispatch:

jobs:
  lint-and-build:
    name: Lint and build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-placeholder
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder
      SUPABASE_DB_URL: postgres://postgres:postgres@localhost:5432/postgres
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Build
        run: yarn build
